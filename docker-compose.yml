x-common: &common
  env_file: .env
  environment:
    DB_HOST: ${DB_HOST:-postgres}
    REDIS_HOST: ${REDIS_HOST:-redis}
  depends_on:
    postgres:
      condition: service_healthy
  restart: unless-stopped

services:
  # ── Database ──────────────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-incentivos}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-incentivos}"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ── Microservicios ────────────────────────────────────────
  auth:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    <<: *common
    ports: ["3001"]
    command: ["node", "auth/dist/server.js"]

  employees:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    <<: *common
    ports: ["3002"]
    command: ["node", "employees/dist/server.js"]

  references:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    <<: *common
    ports: ["3003"]
    command: ["node", "references/dist/server.js"]

  orders:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    <<: *common
    ports: ["3004"]
    command: ["node", "orders/dist/server.js"]

  production:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    <<: *common
    ports: ["3005"]
    command: ["node", "production/dist/server.js"]

  work-logs:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    <<: *common
    ports: ["3006"]
    command: ["node", "work-logs/dist/server.js"]

  liquidation:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    <<: *common
    ports: ["3007"]
    command: ["node", "liquidation/dist/server.js"]

  # ── API Gateway ───────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    <<: *common
    ports:
      - "${PORT:-3000}:3000"
    environment:
      <<: *common
      SERVICE_AUTH_HOST: auth
      SERVICE_AUTH_PORT: "3001"
      SERVICE_EMPLOYEES_HOST: employees
      SERVICE_EMPLOYEES_PORT: "3002"
      SERVICE_REFERENCES_HOST: references
      SERVICE_REFERENCES_PORT: "3003"
      SERVICE_ORDERS_HOST: orders
      SERVICE_ORDERS_PORT: "3004"
      SERVICE_PRODUCTION_HOST: production
      SERVICE_PRODUCTION_PORT: "3005"
      SERVICE_WORK_LOGS_HOST: work-logs
      SERVICE_WORK_LOGS_PORT: "3006"
      SERVICE_LIQUIDATION_HOST: liquidation
      SERVICE_LIQUIDATION_PORT: "3007"
    command: ["node", "gateway/dist/server.js"]

volumes:
  pgdata:
